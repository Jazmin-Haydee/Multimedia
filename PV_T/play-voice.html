<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Asistente de Voz Interactivo</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 600px; margin: 60px auto; padding: 20px; background: #f0f4f8; }
    h2 { text-align: center; color: #333; }
    textarea { width: 100%; height: 100px; padding: 12px; font-size: 16px; border: 2px solid #ccc; border-radius: 8px; box-sizing: border-box; }
    .controls { display: flex; gap: 10px; margin-top: 15px; flex-wrap: wrap; }
    label { font-size: 14px; color: #555; }
    select, input[type="range"] { width: 100%; margin-top: 5px; }
    .buttons { display: flex; gap: 10px; margin-top: 20px; }
    button { flex: 1; padding: 12px; font-size: 16px; border: none; border-radius: 8px; cursor: pointer; transition: background 0.2s; color: white; }
    #btn-listen { background: #9c27b0; } /* Morado para escuchar */
    #btn-stop   { background: #f44336; }
    #output-area { margin-top: 15px; padding: 15px; background: #fff; border-radius: 8px; color: #444; min-height: 50px; border: 1px solid #ddd; text-align: center; font-weight: bold; }
  </style>
</head>
<body>

  <h2>Voz a Texto</h2>

  <textarea id="input-area" placeholder="Tu voz aparecerá aquí..."></textarea>

  <div class="controls">
    <div style="flex:1">
      <label>🌐 Voz del Asistente:
        <select id="voice-select"></select>
      </label>
    </div>
    <div style="flex:1">
      <label>🐢 Velocidad: <span id="rate-val">1</span>
        <input type="range" id="rate" min="0.5" max="2" step="0.1" value="1">
      </label>
    </div>
  </div>

  <div class="buttons">
    <button id="btn-listen" onclick="startListening()">🎤 Hablar ahora</button>
    <button id="btn-stop" onclick="stopAll()">⏹ Detener</button>
  </div>

  <div id="output-area">Presiona el botón morado para hablar</div>

  <script>
    const synth = window.speechSynthesis;
    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    
    const voiceSelect = document.getElementById('voice-select');
    const outputArea = document.getElementById('output-area');
    const inputArea = document.getElementById('input-area');
    const rateInput = document.getElementById('rate');
    
    let voices = [];

    // Configuración del Reconocimiento de Voz
    recognition.lang = 'es-ES';
    recognition.continuous = false;
    recognition.interimResults = false;

    function loadVoices() {
      voices = synth.getVoices();
      voiceSelect.innerHTML = '';
      voices.forEach((voice, i) => {
        const option = document.createElement('option');
        option.value = i;
        option.textContent = `${voice.name} (${voice.lang})`;
        if(voice.lang.includes('es')) option.selected = true;
        voiceSelect.appendChild(option);
      });
    }

    speechSynthesis.onvoiceschanged = loadVoices;
    loadVoices();

    rateInput.addEventListener('input', () => document.getElementById('rate-val').textContent = rateInput.value);

    // FUNCIÓN: Iniciar escucha
    function startListening() {
      synth.cancel(); // Detener si está hablando
      recognition.start();
      outputArea.innerHTML = "Listening... (Escuchando)";
    }
    recognition.onresult = function(event) {
      const transcript = event.results[0][0].transcript.toLowerCase();
      inputArea.value = transcript;
      procesarRespuesta(transcript);
    };

    recognition.onerror = (e) => {
      outputArea.innerHTML = "❌ Error en reconocimiento: " + e.error;
    };

    // FUNCIÓN: Lógica de respuestas
    function procesarRespuesta(mensaje) {
      let respuesta = "Te escuché, pero no entendi.";

      if (mensaje.includes("hola")) {
        respuesta = "¡Hola!¿Como estas?";
      } 
      else if (mensaje.includes("tiempo")) {
        const fecha = new Date();
        const hora = fecha.getHours();
        const minutos = fecha.getMinutes();
        const horaFormateada = `${hora}:${minutos < 10 ? '0' + minutos : minutos}`;
        respuesta = "Son las " + horaFormateada;
      }
      else if (mensaje.includes("nombre")) {
        respuesta = "Holaaa Jaz.";
      }

      responder(respuesta);
    }

    function responder(texto) {
      const utterance = new SpeechSynthesisUtterance(texto);
      utterance.voice = voices[voiceSelect.value];
      utterance.rate = parseFloat(rateInput.value);
      
      outputArea.innerHTML = "🤖: " + texto;
      synth.speak(utterance);
    }

    function stopAll() {
      synth.cancel();
      recognition.stop();
      outputArea.innerHTML = "⏹ Todo detenido.";
    }
  </script>

</body>
</html>
